spring:
  main:
    lazy-initialization: true

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/video_data_analysis?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:test}
    password: ${DB_PASSWORD:test}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    openai:
      base-url: ${AI_BASE_URL:http://localhost}
      api-key: ${AI_API_KEY:test-key}
      chat:
        options:
          model: ${AI_MODEL:test-model}

app:
  langgraph:
    base-url: ${LANGGRAPH_BASE_URL:http://localhost:8090}
  slow-query:
    enabled: false
  ai:
    strong-model: ${AI_STRONG_MODEL:test-model}
    cheap-model: ${AI_CHEAP_MODEL:test-model}
  embedding:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
  data-initializer:
    enabled: false
